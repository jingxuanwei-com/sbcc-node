<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberEdge Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow"></div>

    <header class="navbar">
        <div class="logo-zone">
            <div class="scanner-line"></div>
            <span class="brand-text">CYBER_CORE v2.6</span>
        </div>
        <div class="system-status">
            <span class="pulse-dot"></span>
            <span class="status-text">PODMAN NODE // ONLINE</span>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <section class="card neon-border-amber">
            <div class="card-header">
                <span class="title">MODBUS TEMP // 40001</span>
                <span class="tag tag-amber">HIGH EFFICIENCY</span>
            </div>
            <div class="card-body">
                <div class="metric-value text-amber">68.2<span class="unit">°C</span></div>
                <div class="progress-bar-container">
                    <div class="progress-bar bg-amber" style="width: 68%;"></div>
                </div>
            </div>
        </section>

        <section class="card neon-border-blue">
            <div class="card-header">
                <span class="title">SYS PRESSURE // 40002</span>
                <span class="tag tag-blue">STABLE</span>
            </div>
            <div class="card-body">
                <div class="metric-value text-blue">4.25<span class="unit">Bar</span></div>
                <div class="progress-bar-container">
                    <div class="progress-bar bg-blue" style="width: 45%;"></div>
                </div>
            </div>
        </section>

        <section class="card neon-border-purple">
            <div class="card-header">
                <span class="title">PODMAN INSTANCES</span>
                <span class="tag tag-purple">ACTIVE</span>
            </div>
            <div class="card-body">
                <div class="metric-value text-purple">04<span class="unit">/ 04</span></div>
                <div class="status-grid">
                    <div class="status-item"><span>CONTAINER_A</span><span class="text-green">RUN</span></div>
                    <div class="status-item"><span>CONTAINER_B</span><span class="text-green">RUN</span></div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
